version: "3.9"

# ============================================================
# Eventos Académicos — Docker Compose
#
# Usage:
#   1. Set your domain in the Caddyfile.
#   2. docker compose up -d --build
#
# The app runs on port 7070 internally.
# Caddy handles SSL (Let's Encrypt) and redirects port 80→443.
# ============================================================

services:

  # ---- Application ----------------------------------------
  app:
    build: .
    image: pucmm/eventos-academicos:latest
    container_name: eventos_app
    restart: unless-stopped
    environment:
      APP_PORT: "7070"
      H2_PORT: "9092"
      DB_PATH: "/app/data/eventos_db"
    volumes:
      - db_data:/app/data
    expose:
      - "7070"
    networks:
      - eventos_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7070/events || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Reverse-proxy + SSL (Caddy) ------------------------
  caddy:
    image: caddy:2-alpine
    container_name: eventos_caddy
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP (auto-redirected to HTTPS)
      - "443:443"     # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - eventos_net
    depends_on:
      - app

# ---- Volumes -----------------------------------------------
volumes:
  db_data:
  caddy_data:
  caddy_config:

# ---- Networks ----------------------------------------------
networks:
  eventos_net:
    driver: bridge
