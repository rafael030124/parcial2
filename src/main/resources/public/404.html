<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventPass — Página no encontrada</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body class="auth-page">
  <div class="auth-bg"></div>
  <div style="text-align:center;position:relative;z-index:1;padding:24px">
    <div style="font-size:120px;font-weight:800;line-height:1;
                background:linear-gradient(135deg,var(--accent),var(--primary));
                -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                background-clip:text;margin-bottom:8px">
      404
    </div>
    <h1 style="font-size:24px;font-weight:700;margin-bottom:8px">Página no encontrada</h1>
    <p style="color:var(--text-secondary);font-size:15px;margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto">
      La ruta que buscas no existe o fue movida a otra dirección.
    </p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <a href="dashboard.html" class="btn btn-primary btn-lg">
        <i class="bi bi-house"></i> Ir al Dashboard
      </a>
      <button class="btn btn-secondary btn-lg" onclick="history.back()">
        <i class="bi bi-arrow-left"></i> Volver
      </button>
    </div>
    <div style="margin-top:40px">
      <div style="font-size:72px;opacity:0.12;line-height:1">
        <i class="bi bi-map"></i>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
</body>
</html>
